name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Lua files
        run: |
          if find . -name "*.lua" | grep -q .; then
            echo "Lua files found"
          else
            echo "No Lua files"
          fi
