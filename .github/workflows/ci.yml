name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-lua:
    name: Lint Lua
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check for Lua files
        run: |
          if find . -name "*.lua" | grep -q .; then
            echo "Found Lua files to lint"
          else
            echo "No Lua files found"
            exit 0
          fi
      - name: Install luacheck
        run: |
          which luacheck || luarocks install luacheck
      - name: Run luacheck
        run: |
          find . -name "*.lua" -exec luacheck {} + || true
